# Workflow para compilar o APK do WakeAlert automaticamente a cada push
# Workflow to build WakeAlert APK automatically on every push
name: Build WakeAlert APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub no celular

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          fi

      - name: Build Debug APK
        run: gradle assembleDebug --no-configuration-cache --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WakeAlert-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
